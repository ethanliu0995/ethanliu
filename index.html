<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员管理系统</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 引入 Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <!-- 自定义 Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1E40AF', // 深蓝色为主色调
                        secondary: '#F59E0B', // 黄色为辅助色
                    },
                    boxShadow: {
                        'card-shadow': '0 2px 8px rgba(0, 0, 0, 0.08)',
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .safe-area-inset {
                padding-bottom: env(safe-area-inset-bottom);
            }
            .content-auto {
                content-visibility: auto;
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 pb-16">
    <main class="container mx-auto px-4 py-6">
        <!-- 头部区域 -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-xl font-bold text-primary">会员管理系统</h1>
                <p id="current-date" class="text-xs text-gray-500 mt-1"></p>
            </div>
            <div class="flex items-center space-x-3">
                <button class="p-2 rounded-full bg-white shadow-md text-gray-600">
                    <i class="fa fa-bell"></i>
                </button>
                <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center text-xs font-bold">
                    AD
                </div>
            </div>
        </div>

        <!-- 仪表盘区域 -->
        <section id="dashboard-section" class="section active">
            <!-- 统计卡片 -->
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-white rounded-xl p-4 card-shadow">
                    <p class="text-xs text-gray-500 mb-1">总会员数</p>
                    <p class="text-xl font-bold text-primary">1,248</p>
                    <p class="text-xs text-green-500 mt-1"><i class="fa fa-arrow-up"></i> 8.2% 环比增长</p>
                </div>
                <div class="bg-white rounded-xl p-4 card-shadow">
                    <p class="text-xs text-gray-500 mb-1">本月新增</p>
                    <p class="text-xl font-bold text-primary">156</p>
                    <p class="text-xs text-green-500 mt-1"><i class="fa fa-arrow-up"></i> 12.5% 同比增长</p>
                </div>
                <div class="bg-white rounded-xl p-4 card-shadow">
                    <p class="text-xs text-gray-500 mb-1">活跃会员</p>
                    <p class="text-xl font-bold text-primary">1,020</p>
                    <p class="text-xs text-green-500 mt-1"><i class="fa fa-arrow-up"></i> 5.3% 环比增长</p>
                </div>
                <div class="bg-white rounded-xl p-4 card-shadow">
                    <p class="text-xs text-gray-500 mb-1">本月活动</p>
                    <p class="text-xl font-bold text-primary">12</p>
                    <p class="text-xs text-gray-500 mt-1"><i class="fa fa-calendar"></i> 4 场进行中</p>
                </div>
            </div>

            <!-- 图表区域 -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
                <!-- 会员增长趋势 -->
                <div class="bg-white rounded-xl p-4 card-shadow">
                    <h3 class="font-bold text-primary mb-4">会员增长趋势</h3>
                    <div class="h-48">
                        <canvas id="membershipGrowthChart"></canvas>
                    </div>
                </div>

                <!-- 会员分布 -->
                <div class="bg-white rounded-xl p-4 card-shadow">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-primary">会员分布</h3>
                        <select id="memberDistributionSelect" class="text-xs border border-gray-200 rounded px-2 py-1">
                            <option value="按等级">按等级</option>
                            <option value="按性别">按性别</option>
                            <option value="按年龄">按年龄</option>
                            <option value="按省份">按省份</option>
                        </select>
                    </div>
                    <div class="h-48">
                        <canvas id="memberDistributionChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- 近期活动 -->
            <div class="bg-white rounded-xl p-4 card-shadow mb-6">
                <h3 class="font-bold text-primary mb-4">近期活动</h3>
                <div class="space-y-4">
                    <div class="border-b border-gray-100 pb-4">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-bold text-primary">会员技能提升工作坊</h3>
                            <span class="badge badge-secondary bg-secondary/10 text-secondary px-2 py-1 rounded text-xs">筹备中</span>
                        </div>
                        <div class="flex items-center text-xs text-gray-600 mb-1">
                            <i class="fa fa-calendar mr-1"></i> 2024-06-25 15:30
                        </div>
                        <div class="flex items-center text-xs text-gray-600 mb-3">
                            <i class="fa fa-map-marker mr-1"></i> 培训室A
                        </div>
                        <div class="flex justify-between items-center">
                            <div class="text-sm">
                                <span class="font-bold text-primary">62</span>/80 人已报名
                            </div>
                            <div class="flex space-x-2">
                                <button class="px-3 py-1 text-xs rounded border border-primary text-primary">编辑</button>
                                <button class="px-3 py-1 text-xs rounded bg-primary text-white">查看</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 会员页面 -->
        <section id="members-section" class="section hidden">
            <div class="bg-white rounded-xl p-4 card-shadow mb-6">
                <h3 class="font-bold text-primary mb-4">会员管理</h3>
                <p class="text-gray-500 text-sm">会员列表及管理功能区域</p>
            </div>
        </section>

        <!-- 活动页面 -->
        <section id="activities-section" class="section hidden">
            <div class="bg-white rounded-xl p-4 card-shadow mb-6">
                <h3 class="font-bold text-primary mb-4">活动管理</h3>
                <p class="text-gray-500 text-sm">活动列表及管理功能区域</p>
            </div>
        </section>

        <!-- 数据分析页面 -->
        <section id="analytics-section" class="section hidden">
            <!-- 图表区域 -->
            <div class="space-y-6 mb-6">
                <!-- 会员活跃度分析 -->
                <div class="bg-white rounded-xl p-4 card-shadow">
                    <h3 class="font-bold text-primary mb-4">会员活跃度分析</h3>
                    <div class="h-48">
                        <canvas id="memberActivityChart"></canvas>
                    </div>
                </div>

                <!-- 会员留存率 -->
                <div class="bg-white rounded-xl p-4 card-shadow">
                    <h3 class="font-bold text-primary mb-4">会员留存率</h3>
                    <div class="h-48">
                        <canvas id="memberRetentionChart"></canvas>
                    </div>
                </div>

                <!-- 会员消费分析 -->
                <div class="bg-white rounded-xl p-4 card-shadow">
                    <h3 class="font-bold text-primary mb-4">会员消费分析</h3>
                    <div class="h-48">
                        <canvas id="memberSpendingChart"></canvas>
                    </div>
                </div>

                <!-- 活动参与度 -->
                <div class="bg-white rounded-xl p-4 card-shadow">
                    <h3 class="font-bold text-primary mb-4">活动参与度</h3>
                    <div class="h-48">
                        <canvas id="activityParticipationChart"></canvas>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 底部导航栏 -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white shadow-lg z-50 safe-area-inset">
        <div class="flex justify-around h-16">
            <button class="nav-item flex flex-col items-center justify-center space-y-1 text-primary" data-section="dashboard">
                <i class="fa fa-dashboard text-lg"></i>
                <span class="text-xs font-medium">仪表盘</span>
            </button>
            <button class="nav-item flex flex-col items-center justify-center space-y-1 text-gray-500" data-section="members">
                <i class="fa fa-users text-lg"></i>
                <span class="text-xs font-medium">会员</span>
            </button>
            <button class="nav-item flex flex-col items-center justify-center space-y-1 text-gray-500" data-section="activities">
                <i class="fa fa-calendar text-lg"></i>
                <span class="text-xs font-medium">活动</span>
            </button>
            <button class="nav-item flex flex-col items-center justify-center space-y-1 text-gray-500" data-section="analytics">
                <i class="fa fa-bar-chart text-lg"></i>
                <span class="text-xs font-medium">分析</span>
            </button>
        </div>
    </nav>

    <script>
        // 设置当前日期
        document.addEventListener('DOMContentLoaded', function() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('current-date').textContent = now.toLocaleDateString('zh-CN', options);
            
            // 初始化图表
            initCharts();
            
            // 初始化页面切换
            initPageNavigation();
            
            // 初始化会员分布筛选
            initMemberDistributionFilter();
        });
        
        // 页面导航
        function initPageNavigation() {
            const navItems = document.querySelectorAll('.nav-item');
            
            navItems.forEach(item => {
                item.addEventListener('click', () => {
                    const sectionId = item.dataset.section;
                    showSection(sectionId);
                    
                    // 更新导航状态
                    navItems.forEach(navItem => {
                        if (navItem.dataset.section === sectionId) {
                            navItem.classList.add('text-primary');
                            navItem.classList.remove('text-gray-500');
                        } else {
                            navItem.classList.remove('text-primary');
                            navItem.classList.add('text-gray-500');
                        }
                    });
                });
            });
        }
        
        // 显示指定部分
        function showSection(sectionId) {
            // 隐藏所有部分
            document.querySelectorAll('.section').forEach(section => {
                section.classList.add('hidden');
                section.classList.remove('active');
            });
            
            // 显示选中的部分
            const selectedSection = document.getElementById(`${sectionId}-section`);
            if (selectedSection) {
                selectedSection.classList.remove('hidden');
                selectedSection.classList.add('active');
            }
        }
        
        // 会员分布筛选功能
        function initMemberDistributionFilter() {
            const selectElement = document.getElementById('memberDistributionSelect');
            if (selectElement) {
                selectElement.addEventListener('change', function() {
                    const selectedOption = this.value;
                    updateMemberDistributionChart(selectedOption);
                });
            }
        }
        
        // 更新会员分布图表
        function updateMemberDistributionChart(selectedOption) {
            let chartData = {};
            
            switch(selectedOption) {
                case '按等级':
                    chartData = {
                        labels: ['标准会员', '高级会员', 'VIP会员'],
                        data: [650, 350, 248],
                        backgroundColor: ['#6B7280', '#F59E0B', '#1E40AF']
                    };
                    break;
                case '按性别':
                    chartData = {
                        labels: ['男性', '女性', '其他'],
                        data: [580, 620, 48],
                        backgroundColor: ['#3B82F6', '#EC4899', '#8B5CF6']
                    };
                    break;
                case '按年龄':
                    chartData = {
                        labels: ['18-25岁', '26-35岁', '36-45岁', '46-55岁', '56岁以上'],
                        data: [280, 450, 320, 150, 48],
                        backgroundColor: ['#10B981', '#F59E0B', '#3B82F6', '#EC4899', '#8B5CF6']
                    };
                    break;
                case '按省份':
                    chartData = {
                        labels: ['北京', '上海', '广东', '浙江', '江苏', '其他'],
                        data: [220, 180, 250, 160, 140, 298],
                        backgroundColor: ['#3B82F6', '#10B981', '#F59E0B', '#EC4899', '#8B5CF6', '#6B7280']
                    };
                    break;
            }
            
            if (window.memberDistributionChart) {
                window.memberDistributionChart.data.labels = chartData.labels;
                window.memberDistributionChart.data.datasets[0].data = chartData.data;
                window.memberDistributionChart.data.datasets[0].backgroundColor = chartData.backgroundColor;
                window.memberDistributionChart.update();
            }
        }
        
        // 初始化图表
        function initCharts() {
            // 设置Chart.js全局配置
            Chart.defaults.color = '#6B7280';
            Chart.defaults.borderColor = 'rgba(107, 114, 128, 0.2)';
            Chart.defaults.font.family = 'Inter, system-ui, sans-serif';
            Chart.defaults.font.weight = '400';
            
            // 会员增长趋势图表
            const membershipGrowthCtx = document.getElementById('membershipGrowthChart');
            if (membershipGrowthCtx) {
                new Chart(membershipGrowthCtx, {
                    type: 'line',
                    data: {
                        labels: ['1月', '2月', '3月', '4月', '5月', '6月'],
                        datasets: [{
                            label: '会员数量',
                            data: [1050, 1080, 1120, 1150, 1200, 1248],
                            borderColor: '#1E40AF',
                            backgroundColor: 'rgba(30, 64, 175, 0.1)',
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: false
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: false,
                                min: 1000,
                                grid: {
                                    color: 'rgba(107, 114, 128, 0.1)'
                                }
                            },
                            x: {
                                grid: {
                                    display: false
                                }
                            }
                        }
                    }
                });
            }
            
            // 会员分布图表
            const memberDistributionCtx = document.getElementById('memberDistributionChart');
            if (memberDistributionCtx) {
                window.memberDistributionChart = new Chart(memberDistributionCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['标准会员', '高级会员', 'VIP会员'],
                        datasets: [{
                            data: [650, 350, 248],
                            backgroundColor: [
                                '#6B7280',
                                '#F59E0B',
                                '#1E40AF'
                            ],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    boxWidth: 12,
                                    padding: 10,
                                    font: {
                                        size: 10
                                    }
                                }
                            }
                        },
                        cutout: '70%'
                    }
                });
            }
            
            // 会员活跃度图表
            const memberActivityCtx = document.getElementById('memberActivityChart');
            if (memberActivityCtx) {
                new Chart(memberActivityCtx, {
                    type: 'line',
                    data: {
                        labels: ['1月', '2月', '3月', '4月', '5月', '6月'],
                        datasets: [{
                            label: '活跃会员',
                            data: [850, 880, 920, 950, 980, 1020],
                            borderColor: '#1E40AF',
                            backgroundColor: 'rgba(30, 64, 175, 0.1)',
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: false
                            }
                        },
                        scales: {
                            y: {
                                grid: {
                                    color: 'rgba(107, 114, 128, 0.1)'
                                }
                            },
                            x: {
                                grid: {
                                    display: false
                                }
                            }
                        }
                    }
                });
            }
            
            // 会员留存率图表
            const memberRetentionCtx = document.getElementById('memberRetentionChart');
            if (memberRetentionCtx) {
                new Chart(memberRetentionCtx, {
                    type: 'bar',
                    data: {
                        labels: ['1月', '2月', '3月', '4月', '5月', '6月'],
                        datasets: [{
                            label: '留存率',
                            data: [85, 87, 88, 90, 92, 94],
                            backgroundColor: '#1E40AF'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: false
                            }
                        },
                        scales: {
                            y: {
                                grid: {
                                    color: 'rgba(107, 114, 128, 0.1)'
                                },
                                min: 80,
                                max: 100
                            },
                            x: {
                                grid: {
                                    display: false
                                }
                            }
                        }
                    }
                });
            }
            
            // 会员消费分析图表
            const memberSpendingCtx = document.getElementById('memberSpendingChart');
            if (memberSpendingCtx) {
                new Chart(memberSpendingCtx, {
                    type: 'line',
                    data: {
                        labels: ['1月', '2月', '3月', '4月', '5月', '6月'],
                        datasets: [{
                            label: '标准会员',
                            data: [12000, 13500, 14200, 15000, 16500, 17800],
                            borderColor: '#6B7280',
                            tension: 0.4,
                            fill: false
                        }, {
                            label: '高级会员',
                            data: [18000, 19500, 21000, 22500, 24000, 26500],
                            borderColor: '#F59E0B',
                            tension: 0.4,
                            fill: false
                        }, {
                            label: 'VIP会员',
                            data: [25000, 28000, 30000, 32500, 35000, 38000],
                            borderColor: '#1E40AF',
                            tension: 0.4,
                            fill: false
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    boxWidth: 10,
                                    padding: 8,
                                    font: {
                                        size: 9
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                grid: {
                                    color: 'rgba(107, 114, 128, 0.1)'
                                }
                            },
                            x: {
                                grid: {
                                    display: false
                                }
                            }
                        }
                    }
                });
            }
            
            // 活动参与度图表
            const activityParticipationCtx = document.getElementById('activityParticipationChart');
            if (activityParticipationCtx) {
                new Chart(activityParticipationCtx, {
                    type: 'radar',
                    data: {
                        labels: ['线上讲座', '线下活动', '工作坊', '社交聚会', '技能培训', '会员专属'],
                        datasets: [{
                            label: '参与度',
                            data: [65, 78, 85, 70, 90, 88],
                            backgroundColor: 'rgba(30, 64, 175, 0.2)',
                            borderColor: '#1E40AF',
                            pointBackgroundColor: '#1E40AF',
                            pointBorderColor: '#fff',
                            pointHoverBackgroundColor: '#fff',
                            pointHoverBorderColor: '#1E40AF'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            r: {
                                angleLines: {
                                    color: 'rgba(107, 114, 128, 0.2)'
                                },
                                grid: {
                                    color: 'rgba(107, 114, 128, 0.1)'
                                },
                                pointLabels: {
                                    font: {
                                        size: 9
                                    }
                                },
                                suggestedMin: 0,
                                suggestedMax: 100
                            }
                        }
                    }
                });
            }
        }
    </script>
</body>
</html>
